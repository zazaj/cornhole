<!DOCTYPE html>
<html>
  <head>
    <meta charset=utf-8 />
    <title>Cornhole Tournament</title>
    <script type="text/javascript">
      // GitHub Pages 404 redirect
      // This file redirects all 404s back to the index page with the original path preserved
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/cornhole/index.html?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
